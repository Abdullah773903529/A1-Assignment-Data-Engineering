<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة المشاريع والمهام</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 12px 30px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .tab-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        .tab-btn.active {
            background: white;
            color: #764ba2;
            border-color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .content-section {
            display: none;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s;
        }
        .content-section.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h2 {
            color: #764ba2;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        h3 {
            color: #667eea;
            margin: 20px 0 15px;
        }
        .form-container {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }
        form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        input, textarea, select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            grid-column: span 1;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        button.delete {
            background: linear-gradient(135deg, #f56565 0%, #c53030 100%);
            padding: 6px 12px;
            font-size: 0.9em;
        }
        button.edit {
            background: linear-gradient(135deg, #48bb78 0%, #2f855a 100%);
            padding: 6px 12px;
            font-size: 0.9em;
            margin-left: 5px;
        }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .item-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            border-right: 4px solid #667eea;
            transition: transform 0.2s;
        }
        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .item-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #764ba2;
            margin-bottom: 10px;
        }
        .item-detail {
            color: #666;
            margin-bottom: 5px;
            font-size: 0.95em;
        }
        .item-detail strong {
            color: #555;
        }
        .item-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
            background: #e2e8f0;
            color: #4a5568;
        }
        .status-badge.pending { background: #fefcbf; color: #975a16; }
        .status-badge.in-progress { background: #bee3f8; color: #2c5282; }
        .status-badge.completed { background: #c6f6d5; color: #276749; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .close-btn {
            float: left;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }
        .close-btn:hover {
            color: #f56565;
        }
        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
        }
        .success {
            background: #c6f6d5;
            color: #276749;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
        }
        @media (max-width: 768px) {
            .container { padding: 10px; }
            form { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 نظام إدارة المشاريع والمهام</h1>

        <!-- تبويبات التنقل -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('users')">👥 المستخدمين</button>
            <button class="tab-btn" onclick="showTab('projects')">📁 المشاريع</button>
            <button class="tab-btn" onclick="showTab('tasks')">✅ المهام</button>
        </div>

        <!-- قسم المستخدمين -->
        <div id="users-section" class="content-section active">
            <h2>👥 إدارة المستخدمين</h2>

            <!-- نموذج إضافة مستخدم -->
            <div class="form-container">
                <h3>إضافة مستخدم جديد</h3>
                <form id="userForm">
                    <div class="form-group">
                        <label for="username">اسم المستخدم *</label>
                        <input type="text" id="username" required placeholder="أدخل اسم المستخدم">
                    </div>
                    <div class="form-group">
                        <label for="email">البريد الإلكتروني *</label>
                        <input type="email" id="email" required placeholder="user@example.com">
                    </div>
                    <div class="form-group">
                        <label for="is_active">حالة النشاط</label>
                        <select id="is_active">
                            <option value="true">نشط</option>
                            <option value="false">غير نشط</option>
                        </select>
                    </div>
                    <button type="submit">➕ إضافة مستخدم</button>
                </form>
            </div>

            <!-- قائمة المستخدمين -->
            <h3>قائمة المستخدمين</h3>
            <div id="usersList" class="items-grid"></div>
        </div>

        <!-- قسم المشاريع -->
        <div id="projects-section" class="content-section">
            <h2>📁 إدارة المشاريع</h2>

            <!-- نموذج إضافة مشروع -->
            <div class="form-container">
                <h3>إضافة مشروع جديد</h3>
                <form id="projectForm">
                    <div class="form-group">
                        <label for="project_title">عنوان المشروع *</label>
                        <input type="text" id="project_title" required placeholder="أدخل عنوان المشروع">
                    </div>
                    <div class="form-group">
                        <label for="project_description">وصف المشروع</label>
                        <textarea id="project_description" rows="2" placeholder="أدخل وصف المشروع"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="project_owner_id">معرف المالك *</label>
                        <input type="number" id="project_owner_id" required placeholder="أدخل معرف المستخدم">
                    </div>
                    <button type="submit">➕ إضافة مشروع</button>
                </form>
            </div>

            <!-- قائمة المشاريع -->
            <h3>قائمة المشاريع</h3>
            <div id="projectsList" class="items-grid"></div>
        </div>

        <!-- قسم المهام -->
        <div id="tasks-section" class="content-section">
            <h2>✅ إدارة المهام</h2>

            <!-- نموذج إضافة مهمة -->
            <div class="form-container">
                <h3>إضافة مهمة جديدة</h3>
                <form id="taskForm">
                    <div class="form-group">
                        <label for="task_title">عنوان المهمة *</label>
                        <input type="text" id="task_title" required placeholder="أدخل عنوان المهمة">
                    </div>
                    <div class="form-group">
                        <label for="task_description">وصف المهمة</label>
                        <textarea id="task_description" rows="2" placeholder="أدخل وصف المهمة"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="task_status">الحالة</label>
                        <select id="task_status">
                            <option value="pending">قيد الانتظار</option>
                            <option value="in-progress">قيد التنفيذ</option>
                            <option value="completed">مكتملة</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="task_project_id">معرف المشروع *</label>
                        <input type="number" id="task_project_id" required placeholder="أدخل معرف المشروع">
                    </div>
                    <div class="form-group">
                        <label for="task_assigned_to">مسندة إلى (معرف المستخدم)</label>
                        <input type="number" id="task_assigned_to" placeholder="أدخل معرف المستخدم (اختياري)">
                    </div>
                    <button type="submit">➕ إضافة مهمة</button>
                </form>
            </div>

            <!-- قائمة المهام -->
            <h3>قائمة المهام</h3>
            <div id="tasksList" class="items-grid"></div>
        </div>
    </div>

    <!-- نافذة تعديل منبثقة -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeEditModal()">&times;</span>
            <h2 id="modalTitle">تعديل العنصر</h2>
            <form id="editForm">
                <div id="editFormFields"></div>
                <button type="submit">💾 حفظ التغييرات</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000';
        let currentEditId = null;
        let currentEditType = null;

        // تبديل التبويبات
        function showTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(section => section.classList.remove('active'));

            document.querySelector(`.tab-btn[onclick="showTab('${tabName}')"]`).classList.add('active');
            document.getElementById(`${tabName}-section`).classList.add('active');

            // تحديث البيانات عند التبديل
            if (tabName === 'users') fetchUsers();
            if (tabName === 'projects') fetchProjects();
            if (tabName === 'tasks') fetchTasks();
        }

        // ==================== دوال المستخدمين ====================
        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                is_active: document.getElementById('is_active').value === 'true'
            };

            try {
                const response = await fetch(`${API_BASE}/users/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                if (!response.ok) {
                    const error = await response.json();
                    showError('users', error.detail || 'حدث خطأ');
                    return;
                }

                document.getElementById('userForm').reset();
                fetchUsers();
                showSuccess('users', 'تم إضافة المستخدم بنجاح');
            } catch (error) {
                showError('users', 'فشل الاتصال بالخادم');
            }
        });

        async function fetchUsers() {
            try {
                const response = await fetch(`${API_BASE}/users/`);
                const users = await response.json();
                displayUsers(users);
            } catch (error) {
                document.getElementById('usersList').innerHTML = '<div class="error">فشل تحميل المستخدمين</div>';
            }
        }

        function displayUsers(users) {
            const listDiv = document.getElementById('usersList');
            if (users.length === 0) {
                listDiv.innerHTML = '<p class="loading">لا يوجد مستخدمين بعد</p>';
                return;
            }

            listDiv.innerHTML = users.map(user => `
                <div class="item-card">
                    <div class="item-title">${user.username}</div>
                    <div class="item-detail"><strong>البريد:</strong> ${user.email}</div>
                    <div class="item-detail"><strong>المعرف:</strong> ${user.id}</div>
                    <div class="item-detail"><strong>الحالة:</strong> ${user.is_active ? '🟢 نشط' : '🔴 غير نشط'}</div>
                    <div class="item-actions">
                        <button class="edit" onclick="openEditUser(${user.id}, '${user.username}', '${user.email}', ${user.is_active})">✏️ تعديل</button>
                        <button class="delete" onclick="deleteUser(${user.id})">🗑️ حذف</button>
                    </div>
                </div>
            `).join('');
        }

        async function deleteUser(userId) {
            if (!confirm('هل أنت متأكد من حذف هذا المستخدم؟')) return;

            try {
                const response = await fetch(`${API_BASE}/users/${userId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    const error = await response.json();
                    showError('users', error.detail || 'حدث خطأ');
                    return;
                }

                fetchUsers();
                showSuccess('users', 'تم حذف المستخدم بنجاح');
            } catch (error) {
                showError('users', 'فشل الاتصال بالخادم');
            }
        }

        function openEditUser(id, username, email, isActive) {
            currentEditId = id;
            currentEditType = 'user';
            document.getElementById('modalTitle').innerText = 'تعديل المستخدم';

            const fields = `
                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="edit_username" value="${username}" required>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="edit_email" value="${email}" required>
                </div>
                <div class="form-group">
                    <label>الحالة</label>
                    <select id="edit_is_active">
                        <option value="true" ${isActive ? 'selected' : ''}>نشط</option>
                        <option value="false" ${!isActive ? 'selected' : ''}>غير نشط</option>
                    </select>
                </div>
            `;

            document.getElementById('editFormFields').innerHTML = fields;
            document.getElementById('editModal').classList.add('active');
        }

        // ==================== دوال المشاريع ====================
        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const projectData = {
                title: document.getElementById('project_title').value,
                description: document.getElementById('project_description').value || null,
                owner_id: parseInt(document.getElementById('project_owner_id').value)
            };

            try {
                const response = await fetch(`${API_BASE}/projects/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(projectData)
                });

                if (!response.ok) {
                    const error = await response.json();
                    showError('projects', error.detail || 'حدث خطأ');
                    return;
                }

                document.getElementById('projectForm').reset();
                fetchProjects();
                showSuccess('projects', 'تم إضافة المشروع بنجاح');
            } catch (error) {
                showError('projects', 'فشل الاتصال بالخادم');
            }
        });

        async function fetchProjects() {
            try {
                const response = await fetch(`${API_BASE}/projects/`);
                const projects = await response.json();
                displayProjects(projects);
            } catch (error) {
                document.getElementById('projectsList').innerHTML = '<div class="error">فشل تحميل المشاريع</div>';
            }
        }

        function displayProjects(projects) {
            const listDiv = document.getElementById('projectsList');
            if (projects.length === 0) {
                listDiv.innerHTML = '<p class="loading">لا يوجد مشاريع بعد</p>';
                return;
            }

            listDiv.innerHTML = projects.map(project => `
                <div class="item-card">
                    <div class="item-title">${project.title}</div>
                    <div class="item-detail"><strong>الوصف:</strong> ${project.description || 'لا يوجد وصف'}</div>
                    <div class="item-detail"><strong>المعرف:</strong> ${project.id}</div>
                    <div class="item-detail"><strong>معرف المالك:</strong> ${project.owner_id}</div>
                    <div class="item-actions">
                        <button class="edit" onclick="openEditProject(${project.id}, '${project.title}', '${project.description || ''}', ${project.owner_id})">✏️ تعديل</button>
                        <button class="delete" onclick="deleteProject(${project.id})">🗑️ حذف</button>
                    </div>
                </div>
            `).join('');
        }

        async function deleteProject(projectId) {
            if (!confirm('هل أنت متأكد من حذف هذا المشروع؟')) return;

            try {
                const response = await fetch(`${API_BASE}/projects/${projectId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    const error = await response.json();
                    showError('projects', error.detail || 'حدث خطأ');
                    return;
                }

                fetchProjects();
                showSuccess('projects', 'تم حذف المشروع بنجاح');
            } catch (error) {
                showError('projects', 'فشل الاتصال بالخادم');
            }
        }

        function openEditProject(id, title, description, ownerId) {
            currentEditId = id;
            currentEditType = 'project';
            document.getElementById('modalTitle').innerText = 'تعديل المشروع';

            const fields = `
                <div class="form-group">
                    <label>عنوان المشروع</label>
                    <input type="text" id="edit_title" value="${title}" required>
                </div>
                <div class="form-group">
                    <label>الوصف</label>
                    <textarea id="edit_description" rows="3">${description}</textarea>
                </div>
                <div class="form-group">
                    <label>معرف المالك</label>
                    <input type="number" id="edit_owner_id" value="${ownerId}" required>
                </div>
            `;

            document.getElementById('editFormFields').innerHTML = fields;
            document.getElementById('editModal').classList.add('active');
        }

        // ==================== دوال المهام ====================
        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const assignedTo = document.getElementById('task_assigned_to').value;
            const taskData = {
                title: document.getElementById('task_title').value,
                description: document.getElementById('task_description').value || null,
                status: document.getElementById('task_status').value,
                project_id: parseInt(document.getElementById('task_project_id').value),
                assigned_to: assignedTo ? parseInt(assignedTo) : null
            };

            try {
                const response = await fetch(`${API_BASE}/tasks/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(taskData)
                });

                if (!response.ok) {
                    const error = await response.json();
                    showError('tasks', error.detail || 'حدث خطأ');
                    return;
                }

                document.getElementById('taskForm').reset();
                fetchTasks();
                showSuccess('tasks', 'تم إضافة المهمة بنجاح');
            } catch (error) {
                showError('tasks', 'فشل الاتصال بالخادم');
            }
        });

        async function fetchTasks() {
            try {
                const response = await fetch(`${API_BASE}/tasks/`);
                const tasks = await response.json();
                displayTasks(tasks);
            } catch (error) {
                document.getElementById('tasksList').innerHTML = '<div class="error">فشل تحميل المهام</div>';
            }
        }

        function displayTasks(tasks) {
            const listDiv = document.getElementById('tasksList');
            if (tasks.length === 0) {
                listDiv.innerHTML = '<p class="loading">لا يوجد مهام بعد</p>';
                return;
            }

            listDiv.innerHTML = tasks.map(task => `
                <div class="item-card">
                    <div class="item-title">${task.title}</div>
                    <div class="item-detail"><strong>الوصف:</strong> ${task.description || 'لا يوجد وصف'}</div>
                    <div class="item-detail"><strong>الحالة:</strong>
                        <span class="status-badge ${task.status}">${task.status}</span>
                    </div>
                    <div class="item-detail"><strong>معرف المشروع:</strong> ${task.project_id}</div>
                    <div class="item-detail"><strong>مسندة إلى:</strong> ${task.assigned_to || 'غير محدد'}</div>
                    <div class="item-actions">
                        <button class="edit" onclick="openEditTask(${task.id}, '${task.title}', '${task.description || ''}', '${task.status}', ${task.project_id}, ${task.assigned_to || 'null'})">✏️ تعديل</button>
                        <button class="delete" onclick="deleteTask(${task.id})">🗑️ حذف</button>
                    </div>
                </div>
            `).join('');
        }

        async function deleteTask(taskId) {
            if (!confirm('هل أنت متأكد من حذف هذه المهمة؟')) return;

            try {
                const response = await fetch(`${API_BASE}/tasks/${taskId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    const error = await response.json();
                    showError('tasks', error.detail || 'حدث خطأ');
                    return;
                }

                fetchTasks();
                showSuccess('tasks', 'تم حذف المهمة بنجاح');
            } catch (error) {
                showError('tasks', 'فشل الاتصال بالخادم');
            }
        }

        function openEditTask(id, title, description, status, projectId, assignedTo) {
            currentEditId = id;
            currentEditType = 'task';
            document.getElementById('modalTitle').innerText = 'تعديل المهمة';

            const fields = `
                <div class="form-group">
                    <label>عنوان المهمة</label>
                    <input type="text" id="edit_title" value="${title}" required>
                </div>
                <div class="form-group">
                    <label>الوصف</label>
                    <textarea id="edit_description" rows="3">${description}</textarea>
                </div>
                <div class="form-group">
                    <label>الحالة</label>
                    <select id="edit_status">
                        <option value="pending" ${status === 'pending' ? 'selected' : ''}>قيد الانتظار</option>
                        <option value="in-progress" ${status === 'in-progress' ? 'selected' : ''}>قيد التنفيذ</option>
                        <option value="completed" ${status === 'completed' ? 'selected' : ''}>مكتملة</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>معرف المشروع</label>
                    <input type="number" id="edit_project_id" value="${projectId}" required>
                </div>
                <div class="form-group">
                    <label>مسندة إلى (معرف المستخدم)</label>
                    <input type="number" id="edit_assigned_to" value="${assignedTo || ''}">
                </div>
            `;

            document.getElementById('editFormFields').innerHTML = fields;
            document.getElementById('editModal').classList.add('active');
        }

        // ==================== دوال التعديل العامة ====================
        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            let updateData = {};
            let url = '';

            if (currentEditType === 'user') {
                updateData = {
                    username: document.getElementById('edit_username').value,
                    email: document.getElementById('edit_email').value,
                    is_active: document.getElementById('edit_is_active').value === 'true'
                };
                url = `${API_BASE}/users/${currentEditId}`;
            } else if (currentEditType === 'project') {
                updateData = {
                    title: document.getElementById('edit_title').value,
                    description: document.getElementById('edit_description').value || null,
                    owner_id: parseInt(document.getElementById('edit_owner_id').value)
                };
                url = `${API_BASE}/projects/${currentEditId}`;
            } else if (currentEditType === 'task') {
                const assignedTo = document.getElementById('edit_assigned_to').value;
                updateData = {
                    title: document.getElementById('edit_title').value,
                    description: document.getElementById('edit_description').value || null,
                    status: document.getElementById('edit_status').value,
                    project_id: parseInt(document.getElementById('edit_project_id').value),
                    assigned_to: assignedTo ? parseInt(assignedTo) : null
                };
                url = `${API_BASE}/tasks/${currentEditId}`;
            }

            try {
                const response = await fetch(url, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updateData)
                });

                if (!response.ok) {
                    const error = await response.json();
                    alert('خطأ: ' + (error.detail || 'حدث خطأ'));
                    return;
                }

                closeEditModal();
                if (currentEditType === 'user') fetchUsers();
                if (currentEditType === 'project') fetchProjects();
                if (currentEditType === 'task') fetchTasks();
                showSuccess(currentEditType + 's', 'تم التحديث بنجاح');
            } catch (error) {
                alert('فشل الاتصال بالخادم');
            }
        });

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            currentEditId = null;
            currentEditType = null;
        }

        // ==================== دوال مساعدة ====================
        function showError(section, message) {
            const sectionElement = document.getElementById(`${section}List`);
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = message;
            sectionElement.prepend(errorDiv);
            setTimeout(() => errorDiv.remove(), 3000);
        }

        function showSuccess(section, message) {
            const sectionElement = document.getElementById(`${section}List`);
            const successDiv = document.createElement('div');
            successDiv.className = 'success';
            successDiv.textContent = message;
            sectionElement.prepend(successDiv);
            setTimeout(() => successDiv.remove(), 3000);
        }

        // تحميل البيانات الأولية
        document.addEventListener('DOMContentLoaded', () => {
            fetchUsers();
            fetchProjects();
            fetchTasks();
        });

        // إغلاق النافذة المنبثقة عند النقر خارجها
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                closeEditModal();
            }
        }
    </script>
</body>
</html>
